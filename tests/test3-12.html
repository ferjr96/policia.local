<body>
    <h1>Tema 3. Constitución española de 1978</h1>
    
    <form id="testForm">
        <!-- Las preguntas se insertarán aquí dinámicamente -->
    </form>
    
    <div class="controles-navegacion">
        <button type="button" id="anterior-btn" onclick="anteriorPregunta()">Anterior</button>
        <button type="button" id="siguiente-btn" onclick="siguientePregunta()">Siguiente</button>
        <button type="button" id="finalizar-btn" onclick="finalizarTest()">Ver resultados finales</button>
    </div>
        <div id="contador">Pregunta <span id="pregunta-actual">1</span> de <span id="total-preguntas">30</span></div>
    
    <div id="indice">
        <!-- Los números de pregunta se generarán aquí -->
    </div>
    <div id="resultado"></div>
    
    <script>
               // Reemplazar "[a-d]\) --> por "
        const preguntas = [
    {
        "pregunta": "Ante quien responde solidariamente el Gobierno, de su gestión política.",
        "opciones": [
            "Ante el Congreso de los Diputados",
            "Ante los Tribunales",
            "Ante las Cortes Generales",
            "Ante el Rey"
        ],
        "correcta": 0,
        "explicacion": "Artículo 108 | Responsabilidad El Gobierno responde solidariamente en su gestión política ante el Congreso de los Diputados."
    },
    {
        "pregunta": "Ud., como Policía Local ha sido adscrito a una unidad de policía judicial formada por GC, CNP y PL, ¿de quien dependerá Ud.?",
        "opciones": [
            "De los Jueces, de los Tribunales y del Ministerio Fiscal en sus funciones de averiguación del delito.",
            "De sus jefes.",
            "Del Jefe de GC o CNP que mande la unidad.",
            "Todas son correctas."
        ],
        "correcta": 0,
        "explicacion": "Artículo 126 | La policía judicial La policía judicial depende de los Jueces, de los Tribunales y del Ministerio Fiscal en sus funciones de averiguación del delito y descubrimiento y aseguramiento del delincuente, en los términos que la ley establezca."
    },
    {
        "pregunta": "¿Hasta cuantos miembros de una asamblea autonómica podrán defender una proposición de Ley propuesta a través de la mesa del Congreso de los Diputados?",
        "opciones": [
            "Dos",
            "Cinco",
            "Tres",
            "Ninguno"
        ],
        "correcta": 2,
        "explicacion": "Artículo 87 | Iniciativa legislativa 1. Las Asambleas de las Comunidades Autónomas podrán solicitar del Gobierno la adopción de un proyecto de ley o remitir a la Mesa del Congreso una proposición de ley, delegando ante dicha Cámara un máximo de tres miembros de la Asamblea encargados de su defensa."
    },
    {
        "pregunta": "¿Ante quien presenta su dimisión el Gobierno si se ha presentado una moción de censura y la ha perdido?",
        "opciones": [
            "Ante el pueblo.",
            "El Congreso.",
            "Ante el Rey.",
            "Las Cortes Generales."
        ],
        "correcta": 2,
        "explicacion": "Artículo 114 | Procedimiento de moción de censura Si el Congreso niega su confianza al Gobierno, éste presentará su dimisión al Rey, procediéndose a continuación a la designación de Presidente del Gobierno, según lo dispuesto en el artículo 99. 2. Si el Congreso adopta una moción de censura, el Gobierno presentará su dimisión al Rey y el candidato incluido en aquélla se entenderá investido de la confianza de la Cámara a los efectos previstos en el artículo 99. El Rey le nombrará Presidente del Gobierno."
    },
    {
        "pregunta": "Según el art. 57 de la Constitución Española, quien es el legítimo heredero de la dinastía histórica.",
        "opciones": [
            "Todas son correctas",
            "Felipe VI",
            "La Princesa Leonor",
            "Juan Carlos I"
        ],
        "correcta": 3,
        "explicacion": "Artículo 57 | La Sucesión La Corona de España es hereditaria en los sucesores de S. M. Don Juan Carlos I de Borbón, legítimo heredero de la dinastía histórica."
    },
    {
        "pregunta": "Como se le denominará a una disposición del gobierno, que haya sido por delegación del Congreso de los Diputados.",
        "opciones": [
            "Decreto Legislativo",
            "Decreto Ley",
            "Proyecto de Ley",
            "Proposición de Ley"
        ],
        "correcta": 0,
        "explicacion": "Artículo 85 | Decretos legislativos Las disposiciones del Gobierno que contengan legislación delegada recibirán el título de Decretos Legislativos."
    },
    {
        "pregunta": "¿Quién tiene como misión promover la acción de la justicia en defensa de la legalidad, de los derechos de los ciudadanos y del interés público tutelado por la ley?",
        "opciones": [
            "El Ministerio Fiscal.",
            "Los Jueces.",
            "La a y la b son correctas.",
            "Los Magistrados."
        ],
        "correcta": 0,
        "explicacion": "Artículo 124 | Ministerio Fiscal 1. El Ministerio Fiscal, sin perjuicio de las funciones encomendadas a otros órganos, tiene por misión promover la acción de la justicia en defensa de la legalidad, de los derechos de los ciudadanos y del interés público tutelado por la ley, de oficio o a petición de los interesados, así como velar por la independencia de los Tribunales y procurar ante éstos la satisfacción del interés social."
    },
    {
        "pregunta": "A quien emite informes no vinculantes el Consejo de Estado.",
        "opciones": [
            "Al Rey",
            "Consejo de Ministros",
            "Gobierno",
            "Congreso"
        ],
        "correcta": 2,
        "explicacion": "Artículo 107 | Consejo de Estado El Consejo de Estado es el supremo órgano consultivo del Gobierno. Una ley orgánica regulará su composición y competencia."
    },
    {
        "pregunta": "Las Cortes Generales tienen pendientes de aprobación una serie de Tratados Internacionales, indique cuáles de ellos son de su competencia:",
        "opciones": [
            "Todas son correctas",
            "Tratados de carácter Ético",
            "Tratados que modifiquen una ley",
            "Tratado o convenio de carácter paramilitar"
        ],
        "correcta": 2,
        "explicacion": "Artículo 94 | Autorización de las Cortes 1. La prestación del consentimiento del Estado para obligarse por medio de tratados o convenios requerirá la previa autorización de las Cortes Generales, en los siguientes casos: a) Tratados de carácter político. b) Tratados o convenios de carácter militar. c) Tratados o convenios que afecten a la integridad territorial del Estado o a los derechos y deberes fundamentales establecidos en el Título I. d) Tratados o convenios que impliquen obligaciones financieras para la Hacienda Pública. e) Tratados o convenios que supongan modificación o derogación de alguna ley o exijan medidas legislativas para su ejecución. 2. El Congreso y el Senado serán inmediatamente informados de la conclusión de los restantes tratados o convenios."
    },
    {
        "pregunta": "¿Cómo será el procedimiento en materia criminal?",
        "opciones": [
            "Estricto.",
            "Oral.",
            "Escrito.",
            "Reducido."
        ],
        "correcta": 1,
        "explicacion": "Artículo 120 | Publicidad 1. Las actuaciones judiciales serán públicas, con las excepciones que prevean las leyes de procedimiento. 2. El procedimiento será predominantemente oral, sobre todo en materia criminal. 3. Las sentencias serán siempre motivadas y se pronunciarán en audiencia pública."
    },
    {
        "pregunta": "Como serán las peticiones que reciban las Cámaras, de ciudadanos u organizaciones, según el art. 77 de la Constitución.",
        "opciones": [
            "Individuales",
            "Por escrito",
            "Todas son correctas",
            "Colectivas"
        ],
        "correcta": 2,
        "explicacion": "Artículo 77 | Peticiones 1. Las Cámaras pueden recibir peticiones individuales y colectivas, siempre por escrito, quedando prohibida la presentación directa por manifestaciones ciudadanas."
    },
    {
        "pregunta": "Complete la siguiente frase: “. Los órganos de la Administración del Estado son creados, regidos y coordinados de acuerdo con ……”",
        "opciones": [
            "La Ley",
            "Ninguna es correcta",
            "La Constitución",
            "La legislación vigente"
        ],
        "correcta": 0,
        "explicacion": "Artículo 103 | Características de la Administración Pública Los órganos de la Administración del Estado son creados, regidos y coordinados de acuerdo con la ley."
    },
    {
        "pregunta": "El Gobierno de la nación, una vez aprobado en Consejo de Ministros ha presentado al Congreso de los Diputados el proyecto de presupuestos generales del estado, para el año próximo, que tipo de normativa es dicho proyecto?",
        "opciones": [
            "Decreto Ley",
            "Decreto legislativo",
            "Proposición de ley",
            "Proyecto de ley"
        ],
        "correcta": 3,
        "explicacion": "CORRECTA: D Artículo 88 | Proyectos de ley Los proyectos de ley serán aprobados en Consejo de Ministros, que los someterá al Congreso, acompañados de una exposición de motivos y de los antecedentes necesarios para pronunciarse sobre ellos."
    },
    {
        "pregunta": "Según el art. 64 de la Constitución Española, puede ser responsable el Presidente del Tribunal Supremo de los actos que pueda realizar el Rey en el acto solemne de la apertura del Año Judicial.",
        "opciones": [
            "Dependerá si el Presidente del TS ha realizado el, la convocatoria del acto.",
            "No.",
            "Si, es al que le corresponde.",
            "Ninguna es correcta."
        ],
        "correcta": 1,
        "explicacion": "Artículo 64 | El Refrendo. 1. Los actos del Rey serán refrendados por el Presidente del Gobierno y, en su caso, por los Ministros competentes. La propuesta y el nombramiento del Presidente del Gobierno, y la disolución prevista en el artículo 99, serán refrendados por el Presidente del Congreso."
    },
    {
        "pregunta": "¿Cual es la base de la organización y funcionamiento de los Tribunales?",
        "opciones": [
            "El Principio de legalidad.",
            "El Principio de unidad jurisdiccional.",
            "La Constitución.",
            "El Poder Judicial."
        ],
        "correcta": 1,
        "explicacion": "Art. 117 4. El principio de unidad jurisdiccional es la base de la organización y funcionamiento de los Tribunales."
    },
    {
        "pregunta": "Señal de las siguientes Normas jurídicas cuales pertenecen a la iniciativa del Gobierno.",
        "opciones": [
            "Leyes orgánicas",
            "Proyecto de Ley",
            "Proposición de Ley",
            "Decreto Legislativo"
        ],
        "correcta": 1,
        "explicacion": "Artículo 87 | Iniciativa legislativa 1. La iniciativa legislativa corresponde al Gobierno, al Congreso y al Senado, de acuerdo con la Constitución y los Reglamentos de las Cámaras. ( Al Gobierno los Proyectos de Ley y los Decretos Ley)"
    },
    {
        "pregunta": "¿A que Título de la Constitución pertenece el artículo 100?",
        "opciones": [
            "Título III",
            "Titulo V",
            "Título IV",
            "Título VI"
        ],
        "correcta": 2,
        "explicacion": "En el Título IV CE encontramos regulado el Gobierno y la Administración en los artículos 97 a 107 ambos incluidos."
    },
    {
        "pregunta": "¿En que artículo de la Constitución viene regulado que los ciudadanos no podrán acceder a los archivos que contengan datos sobre la intimidad de las personas?",
        "opciones": [
            "100",
            "105",
            "106",
            "110"
        ],
        "correcta": 1,
        "explicacion": "Artículo 105 | Ciudadanía La ley regulará: a) La audiencia de los ciudadanos, directamente o a través de las organizaciones y asociaciones reconocidas por la ley, en el procedimiento de elaboración de las disposiciones administrativas que les afecten. b) El acceso de los ciudadanos a los archivos y registros administrativos, salvo en lo que afecte a la seguridad y defensa del Estado, la averiguación de los delitos y la intimidad de las personas. c) El procedimiento a través del cual deben producirse los actos administrativos, garantizando, cuando proceda, la audiencia del interesado."
    },
    {
        "pregunta": "Una Ley de Bases no podrá contener?",
        "opciones": [
            "Una modificación así misma",
            "Una modificación de una ley de rango superior.",
            "La a y la d son correctas",
            "Aplicar las normas con carácter retroactivo"
        ],
        "correcta": 2,
        "explicacion": "Artículo 83 | Leyes de bases Las leyes de bases no podrán en ningún caso: a) Autorizar la modificación de la propia ley de bases. b) Facultar para dictar normas con carácter retroactivo."
    },
    {
        "pregunta": "Ud., como Policía Local, ¿podría ser miembro del Tribunal Constitucional?",
        "opciones": [
            "Si, si tengo el grado de derecho.",
            "Si.",
            "Si pero con 15 años de ejercicio profesional.",
            "No."
        ],
        "correcta": 3,
        "explicacion": "Artículo 159 | Características principales 1. El Tribunal Constitucional se compone de 12 miembros nombrados por el Rey; de ellos, cuatro a propuesta del Congreso por mayoría de tres quintos de sus miembros; cuatro a propuesta del Senado, con idéntica mayoría; dos a propuesta del Gobierno, y dos a propuesta del Consejo General del Poder Judicial. 2. Los miembros del Tribunal Constitucional deberán ser nombrados entre Magistrados y Fiscales, Profesores de Universidad, funcionarios públicos y Abogados, todos ellos juristas de reconocida competencia con más de quince años de ejercicio profesional. 3. Los miembros del Tribunal Constitucional serán designados por un período de nueve años y se renovarán por terceras partes cada tres."
    },
    {
        "pregunta": "¿Que tipo de mayoría se necesita en el Congreso de los Diputados para declarar el Estado de Sitio?",
        "opciones": [
            "3/4 partes.",
            "Mayoría Simple.",
            "2/3 de la cámara.",
            "Mayoría Absoluta."
        ],
        "correcta": 3,
        "explicacion": "Artículo 116 | Estados de alarma, excepción y de sitio 1. Una ley orgánica regulará los estados de alarma, de excepción y de sitio, y las competencias y limitaciones correspondientes. 4. El estado de sitio será declarado por la mayoría absoluta del Congreso de los Diputados, a propuesta exclusiva del Gobierno. El Congreso determinará su ámbito territorial, duración y condiciones."
    },
    {
        "pregunta": "¿Como se denomina cuando una décima parte de diputados exige la responsabilidad política del Gobierno, presentando un candidato al mismo.?",
        "opciones": [
            "Confianza parlamentaria",
            "Cuestión de confianza.",
            "Censura política",
            "Moción de censura"
        ],
        "correcta": 3,
        "explicacion": "Artículo 113 | Moción de censura 1. El Congreso de los Diputados puede exigir la responsabilidad política del Gobierno mediante la adopción por mayoría absoluta de la moción de censura. 2. La moción de censura deberá ser propuesta al menos por la décima parte de los Diputados, y habrá de incluir un candidato a la Presidencia del Gobierno. 3. La moción de censura no podrá ser votada hasta que transcurran cinco días desde su presentación. En los dos primeros días de dicho plazo podrán presentarse mociones alternativas. 4. Si la moción de censura no fuere aprobada por el Congreso, sus signatarios no podrán presentar otra durante el mismo período de sesiones."
    },
    {
        "pregunta": "Según el art. 72 de la Constitución Española, por qué reglamento se regirán durante las sesiones conjuntas de ambas cámaras:",
        "opciones": [
            "Depende de donde se reúnan.",
            "Por el Reglamento del Congreso.",
            "Por el Reglamento de las Cortes Generales.",
            "Por el Reglamento del Senado."
        ],
        "correcta": 2,
        "explicacion": "Artículo 72 | Funcionamiento. 1. Las Cámaras eligen sus respectivos Presidentes y los demás miembros de sus Mesas. Las sesiones conjuntas serán presididas por el Presidente del Congreso y se regirán por un Reglamento de las Cortes Generales aprobado por mayoría absoluta de cada Cámara."
    },
    {
        "pregunta": "El voto de un Senador, ¿es?",
        "opciones": [
            "colectivo y personal",
            "personal y delegable",
            "individual e indelegable",
            "personal e indelegable"
        ],
        "correcta": 3,
        "explicacion": "Artículo 79 | Adopción de acuerdos 1. Para adoptar acuerdos, las Cámaras deben estar reunidas reglamentariamente y con asistencia de la mayoría de sus miembros. 2. Dichos acuerdos, para ser válidos, deberán ser aprobados por la mayoría de los miembros presentes, sin perjuicio de las mayorías especiales que establezcan la Constitución o las leyes orgánicas y las que para elección de personas establezcan los Reglamentos de las Cámaras. 3. El voto de Senadores y Diputados es personal e indelegable."
    },
    {
        "pregunta": "Podría Ud., iniciar una recogida de firmas para reformar el Código Penal y que este contenga la cadena perpetua y que una vez supere las 500.000, sean admitidas por la mesa del congreso.",
        "opciones": [
            "Si con cualquier número de firmas",
            "Si pero bastaría con 200.000 firmas",
            "No",
            "Si, pero se necesitan más firmas"
        ],
        "correcta": 2,
        "explicacion": "Artículo 87 | Iniciativa legislativa 1. Una ley orgánica regulará las formas de ejercicio y requisitos de la iniciativa popular para la presentación de proposiciones de ley. En todo caso se exigirán no menos de 500.000 firmas acreditadas. No procederá dicha iniciativa en materias propias de ley orgánica, tributarias o de carácter internacional, ni en lo relativo a la prerrogativa de gracia."
    },
    {
        "pregunta": "¿Quien formula al Gobierno las interpelaciones y preguntas, según el art. 111 de la Constitución?",
        "opciones": [
            "La oposición",
            "El Congreso.",
            "Las cámaras",
            "El Senado"
        ],
        "correcta": 2,
        "explicacion": "Artículo 111 | Interpelaciones y peguntas 1. El Gobierno y cada uno de sus miembros están sometidos a las interpelaciones y preguntas que se le formulen en las Cámaras. Para esta clase de debate los Reglamentos establecerán un tiempo mínimo semanal."
    },
    {
        "pregunta": "Señale de los siguientes quienes pueden ser miembros del Consejo General del Poder Judicial:",
        "opciones": [
            "Abogados y juristas de reconocida competencia.",
            "Jueces",
            "Magistrados.",
            "Todas son correctas"
        ],
        "correcta": 3,
        "explicacion": "Artículo 122 | Consejo General del Poder Judicial 1. La ley orgánica del poder judicial determinará la constitución, funcionamiento y gobierno de los Juzgados y Tribunales, así como el estatuto jurídico de los Jueces y Magistrados de carrera, que formarán un Cuerpo único, y del personal al servicio de la Administración de Justicia. 2. El Consejo General del Poder Judicial es el órgano de gobierno del mismo. La ley orgánica establecerá su estatuto y el régimen de incompatibilidades de sus miembros y sus funciones, en particular en materia de nombramientos, ascensos, inspección y régimen disciplinario. 3. El Consejo General del Poder Judicial estará integrado por el Presidente del Tribunal Supremo, que lo presidirá, y por veinte miembros nombrados por el Rey por un período de cinco años. De éstos, doce entre Jueces y Magistrados de todas las categorías judiciales, en los términos que establezca la ley orgánica; cuatro a propuesta del Congreso de los Diputados, y cuatro a propuesta del Senado, elegidos en ambos casos por mayoría de tres quintos de sus miembros, entre abogados y otros juristas, todos ellos de reconocida competencia y con más de quince años de ejercicio en su profesión."
    },
    {
        "pregunta": "Según el art. 57 de la Constitución Española, cualquier duda de hecho o de derecho en el orden de sucesión a la corona, se resolverá mediante:",
        "opciones": [
            "Se seguirá el orden de sucesión establecido.",
            "Una Ley.",
            "Una Ley Orgánica.",
            "Un Real Decreto."
        ],
        "correcta": 2,
        "explicacion": "Artículo 57. 5. Las abdicaciones y renuncias y cualquier duda de hecho o de derecho que ocurra en el orden de sucesión a la Corona se resolverán por una ley orgánica."
    },
    {
        "pregunta": "Si Ud, es Presidente del Gobierno y le han presentado una moción de censura, pero la misma aún no se ha votado, ¿Puede Ud., disolver las Cortes para convocar elecciones?",
        "opciones": [
            "No.",
            "Depende solo podría 24 horas antes de la votación.",
            "Si.",
            "Ninguna es correcta"

        let preguntaActual = 0;
        let respuestasCorrectas = 0;
        let respuestasUsuario = Array(preguntas.length).fill(null);

        // Mostrar la primera pregunta al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
        preguntas.forEach(p => {
            // Guardamos la opción correcta original
            const correctaOriginal = p.opciones[p.correcta];
            // Mezclamos las opciones
            p.opciones = mezclarArray(p.opciones);
            // Actualizamos el índice de la nueva correcta
            p.correcta = p.opciones.indexOf(correctaOriginal);
        });

            document.getElementById('total-preguntas').textContent = preguntas.length;
            generarIndice();
            mostrarPregunta(preguntaActual);
            actualizarControlesNavegacion();
        });
        
        //para mezclar
            function mezclarArray(array) {
            const copia = [...array];
            for (let i = copia.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copia[i], copia[j]] = [copia[j], copia[i]];
            }
            return copia;
            }

        


        // Función para generar el índice de preguntas
        function generarIndice() {
            const indice = document.getElementById('indice');
            indice.innerHTML = '';
            
            preguntas.forEach((_, index) => {
                const numero = document.createElement('div');
                numero.className = 'numero-pregunta';
                numero.textContent = index + 1;
                numero.onclick = function() { irAPregunta(index); };
                indice.appendChild(numero);
            });
        }

        // Función para ir a una pregunta específica
        function irAPregunta(num) {
            preguntaActual = num;
            mostrarPregunta(preguntaActual);
            actualizarControlesNavegacion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Función para mostrar una pregunta
        function mostrarPregunta(num) {
            const form = document.getElementById('testForm');
            form.innerHTML = '';
            
            const pregunta = preguntas[num];
            
            const divPregunta = document.createElement('div');
            divPregunta.className = 'pregunta';
            
            const pTexto = document.createElement('p');
            pTexto.textContent = pregunta.pregunta;
            divPregunta.appendChild(pTexto);
            
            // Crear opciones de respuesta
            pregunta.opciones.forEach((opcion, index) => {
                const label = document.createElement('label');
                
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'pregunta';
                input.value = index;
                input.onclick = function() { verificarRespuesta(index); };
                
                // Verificar si ya se respondió esta pregunta
                if (respuestasUsuario[num] !== null) {
                    input.disabled = true;
                    if (index === pregunta.correcta) {
                        label.classList.add('correcta');
                    } else if (index === respuestasUsuario[num] && respuestasUsuario[num] !== pregunta.correcta) {
                        label.classList.add('incorrecta');
                    }
                }
                
                label.appendChild(input);
                label.appendChild(document.createTextNode(opcion));
                divPregunta.appendChild(label);
            });
            
            // Mostrar explicación si ya se respondió
            if (respuestasUsuario[num] !== null) {
                const divExplicacion = document.createElement('div');
                divExplicacion.className = 'explicacion';
                divExplicacion.textContent = pregunta.explicacion;
                divExplicacion.style.display = 'block';
                divPregunta.appendChild(divExplicacion);
            }
            
            form.appendChild(divPregunta);
            document.getElementById('pregunta-actual').textContent = num + 1;
            
            // Actualizar el índice
            actualizarIndice();
        }

        // Función para actualizar el índice
        function actualizarIndice() {
            const numeros = document.querySelectorAll('.numero-pregunta');
            numeros.forEach((numero, index) => {
                numero.classList.remove('respondida', 'respondida-incorrecta');
                
                if (respuestasUsuario[index] !== null) {
                    if (respuestasUsuario[index] === preguntas[index].correcta) {
                        numero.classList.add('respondida');
                    } else {
                        numero.classList.add('respondida-incorrecta');
                    }
                }
            });
        }

        // Función para verificar la respuesta seleccionada
        function verificarRespuesta(opcionSeleccionada) {
            const pregunta = preguntas[preguntaActual];
            respuestasUsuario[preguntaActual] = opcionSeleccionada;
            
            if (opcionSeleccionada === pregunta.correcta) {
                respuestasCorrectas++;
            } else if (respuestasUsuario[preguntaActual] !== null && pregunta.correcta === respuestasUsuario[preguntaActual]) {
                // Si antes estaba correcta y ahora no, restamos
                respuestasCorrectas--;
            }
            
            // Actualizar la visualización de las opciones
            mostrarPregunta(preguntaActual);
            
            // Mostrar resultado parcial
            const preguntasRespondidas = respuestasUsuario.filter(r => r !== null).length;
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerHTML = `
                <p>Respuestas correctas: ${respuestasCorrectas} de ${preguntasRespondidas}</p>
                <p>Porcentaje de aciertos: ${preguntasRespondidas > 0 ? ((respuestasCorrectas / preguntasRespondidas) * 100).toFixed(1) : 0}%</p>
            `;
            resultadoDiv.style.display = 'block';
            
            // Actualizar controles de navegación
            actualizarControlesNavegacion();
        }

        // Función para actualizar controles de navegación
        function actualizarControlesNavegacion() {
            document.getElementById('anterior-btn').style.display = preguntaActual === 0 ? 'none' : 'block';
            document.getElementById('siguiente-btn').style.display = preguntaActual === preguntas.length - 1 ? 'none' : 'block';
            document.getElementById('finalizar-btn').style.display = preguntaActual === preguntas.length - 1 ? 'block' : 'none';
        }

        // Función para avanzar a la siguiente pregunta
        function siguientePregunta() {
            if (preguntaActual < preguntas.length - 1) {
                preguntaActual++;
                mostrarPregunta(preguntaActual);
                actualizarControlesNavegacion();
            }
        }

        // Función para retroceder a la pregunta anterior
        function anteriorPregunta() {
            if (preguntaActual > 0) {
                preguntaActual--;
                mostrarPregunta(preguntaActual);
                actualizarControlesNavegacion();
            }
        }

        // Función para finalizar el test
        function finalizarTest() {
            const preguntasRespondidas = respuestasUsuario.filter(r => r !== null).length;
            const resultadoFinal = `
                <h3>Test completado</h3>
                <p>Has respondido ${preguntasRespondidas} de ${preguntas.length} preguntas.</p>
                <p>Respuestas correctas: ${respuestasCorrectas} (${preguntasRespondidas > 0 ? ((respuestasCorrectas / preguntasRespondidas) * 100).toFixed(1) : 0}%)</p>
                <p>Respuestas incorrectas: ${preguntasRespondidas - respuestasCorrectas}</p>
                <p>Preguntas sin responder: ${preguntas.length - preguntasRespondidas}</p>
            `;
            document.getElementById('resultado').innerHTML = resultadoFinal;
            document.getElementById('reintentar-incorrectas-btn').style.display = 'block';
        }
        
        function reintentarIncorrectas() {
    const preguntasIncorrectas = preguntas
        .map((pregunta, index) => ({ ...pregunta, indexOriginal: index }))
        .filter((_, index) => respuestasUsuario[index] !== null && respuestasUsuario[index] !== preguntas[index].correcta);

    if (preguntasIncorrectas.length === 0) {
        alert('No has fallado ninguna pregunta.');
        return;
    }

    preguntasIncorrectas.forEach(p => {
        // Desordenar las opciones
        const opcionesOriginales = [...p.opciones];
        const correctaOriginal = p.opciones[p.correcta];

        // Mezclar opciones
        for (let i = opcionesOriginales.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opcionesOriginales[i], opcionesOriginales[j]] = [opcionesOriginales[j], opcionesOriginales[i]];
        }

        p.opciones = opcionesOriginales;
        p.correcta = opcionesOriginales.indexOf(correctaOriginal);
    });

    // Reiniciar variables con solo las incorrectas
    preguntaActual = 0;
    respuestasCorrectas = 0;
    respuestasUsuario = Array(preguntasIncorrectas.length).fill(null);
    preguntas.splice(0, preguntas.length, ...preguntasIncorrectas); // reemplaza el array de preguntas

    // Actualizar interfaz
    document.getElementById('reintentar-incorrectas-btn').style.display = 'none';
    document.getElementById('resultado').style.display = 'none';
    document.getElementById('finalizar-btn').style.display = 'none';

    generarIndice();
    mostrarPregunta(preguntaActual);
    actualizarControlesNavegacion();
}
    </script>
    <button type="button" id="reintentar-incorrectas-btn" style="display:none;" onclick="reintentarIncorrectas()">Reintentar preguntas falladas</button>
</body>

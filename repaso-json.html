<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OposPolicia - Repasar JSON</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            background-color: white;
            color: #0a1a2f;
        }
        h1 {
            color: #bb9402;
            text-align: center;
            margin-bottom: 15px;
        }
        .volver-wrapper { text-align: center; }
        .volver-inicio {
            display: inline-block;
            margin: 0 auto 20px auto;
            padding: 8px 14px;
            background: #0a1a2f;
            color: white;
            border: 2px solid #c29a04;
            border-radius: 5px;
            text-decoration: none;
        }
        .panel-carga {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 18px;
            margin: 20px 0;
            text-align: center;
        }
        .panel-carga input[type="file"] {
            display: block;
            margin: 15px auto;
            max-width: 100%;
        }
        .opciones-repaso {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 12px;
        }
        .opciones-repaso label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }
        .mensaje-error {
            display: none;
            background: #fff3cd;
            border-left: 6px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .origen-pregunta {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 8px;
        }
        .descargas-resultados {
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0 25px 0;
        }
        .descargas-resultados button { margin: 5px; }
        #descargar-incorrectas-btn { background-color: #e67e22; }
        #descargar-sin-contestar-btn { background-color: #7f8c8d; }
        #testForm, .controles-navegacion, #contador, #indice { display: none; }
        #modo-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #bb9402; }
        input:checked + .slider:before { transform: translateX(26px); }
        body.modo-policial {
            background: #010c1f;
            color: #f5f5f5;
        }
        body.modo-policial .pregunta,
        body.modo-policial .panel-carga {
            background: #0a1a2f;
            color: #f5f5f5;
            border-color: #bb9402;
        }
        body.modo-policial .opciones-repaso label {
            background: #13294b;
            color: #f5f5f5;
            border-color: #bb9402;
        }
    </style>
</head>
<body>
    <div id="modo-switch">
        <label class="switch">
            <input type="checkbox" id="toggleModo">
            <span class="slider"></span>
        </label>
    </div>

    <h1>Repasar preguntas guardadas</h1>
    <div class="volver-wrapper"><a class="volver-inicio" href="index.html">← Volver al inicio</a></div>

    <div id="panel-carga" class="panel-carga">
        <h3>Cargar archivo JSON</h3>
        <p>Selecciona uno o varios archivos descargados de preguntas falladas o sin contestar.</p>
        <input type="file" id="archivo-json" accept=".json,application/json" multiple>
        <div class="opciones-repaso">
            <label><input type="checkbox" id="mezclar-preguntas"> Mezclar preguntas</label>
            <label><input type="checkbox" id="mezclar-opciones" checked> Mezclar opciones</label>
            <label><input type="checkbox" id="quitar-duplicadas" checked> Quitar duplicadas</label>
        </div>
        <button type="button" onclick="cargarArchivosJSON()">Empezar repaso</button>
    </div>

    <div id="mensaje-error" class="mensaje-error"></div>

    <form id="testForm"></form>

    <div class="controles-navegacion" id="controles-navegacion">
        <button type="button" id="anterior-btn" onclick="anteriorPregunta()">Anterior</button>
        <button type="button" id="siguiente-btn" onclick="siguientePregunta()">Siguiente</button>
        <button type="button" id="finalizar-btn" onclick="finalizarTest()">Ver resultados finales</button>
    </div>

    <div id="contador">Pregunta <span id="pregunta-actual">1</span> de <span id="total-preguntas">0</span></div>
    <div id="indice"></div>
    <div id="resultado"></div>

    <button type="button" id="reintentar-incorrectas-btn" onclick="reintentarIncorrectas()" style="display:none;">Reintentar incorrectas y no contestadas</button>
    <div id="descargas-resultados" class="descargas-resultados">
        <button type="button" id="descargar-incorrectas-btn" onclick="descargarPreguntasIncorrectas()">Descargar preguntas falladas</button>
        <button type="button" id="descargar-sin-contestar-btn" onclick="descargarPreguntasSinResponder()">Descargar preguntas sin contestar</button>
    </div>

    <script>
        let preguntas = [];
        let preguntaActual = 0;
        let respuestasUsuario = [];

        document.addEventListener('DOMContentLoaded', activarModoPolicial);

        async function cargarArchivosJSON() {
            ocultarError();
            const input = document.getElementById('archivo-json');
            const archivos = Array.from(input.files || []);

            if (!archivos.length) {
                mostrarError('Selecciona al menos un archivo .json.');
                return;
            }

            try {
                let cargadas = [];
                for (const archivo of archivos) {
                    const texto = await leerArchivoComoTexto(archivo);
                    const datos = JSON.parse(texto);
                    cargadas.push(...extraerListaPreguntas(datos));
                }

                cargadas = cargadas.map(normalizarPreguntaDesdeJSON).filter(Boolean);

                if (document.getElementById('quitar-duplicadas').checked) {
                    cargadas = quitarDuplicadas(cargadas);
                }

                if (!cargadas.length) {
                    mostrarError('No he encontrado preguntas válidas en el JSON. Revisa que sea uno de los archivos descargados desde la web.');
                    return;
                }

                cargadas = ordenarPorTemaYOrigen(cargadas);

                if (document.getElementById('mezclar-preguntas').checked) {
                    cargadas = mezclarArray(cargadas);
                }

                if (document.getElementById('mezclar-opciones').checked) {
                    cargadas.forEach(mezclarOpcionesPregunta);
                }

                iniciarRepaso(cargadas);
            } catch (error) {
                mostrarError('No se pudo leer el archivo. Asegúrate de que es un JSON válido. Detalle: ' + error.message);
                console.error(error);
            }
        }

        function leerArchivoComoTexto(archivo) {
            return new Promise((resolve, reject) => {
                const lector = new FileReader();
                lector.onload = () => resolve(String(lector.result || ''));
                lector.onerror = () => reject(new Error('Error leyendo ' + archivo.name));
                lector.readAsText(archivo, 'utf-8');
            });
        }

        function extraerListaPreguntas(datos) {
            if (Array.isArray(datos)) return datos;
            if (datos && Array.isArray(datos.preguntas)) return datos.preguntas;
            if (datos && Array.isArray(datos.items)) return datos.items;
            return [];
        }

        function normalizarPreguntaDesdeJSON(item) {
            if (!item || typeof item !== 'object') return null;

            const textoPregunta = item.pregunta || item.enunciado || item.texto;
            const opciones = Array.isArray(item.opciones) ? [...item.opciones] : [];
            const respuestaCorrecta = item.respuesta_correcta || item.correcta_texto || item.correctaRespuesta;

            if (!textoPregunta || opciones.length < 2 || !respuestaCorrecta) return null;

            let correcta = opciones.indexOf(respuestaCorrecta);
            if (correcta === -1) {
                opciones.push(respuestaCorrecta);
                correcta = opciones.length - 1;
            }

            return {
                numero_en_test: item.numero_en_test || null,
                tema: item.tema === '' || item.tema === undefined ? null : Number(item.tema),
                test: item.test === '' || item.test === undefined ? null : Number(item.test),
                origen: item.origen || crearOrigen(item),
                pregunta: textoPregunta,
                opciones,
                correcta,
                explicacion: item.explicacion || '',
                respuesta_marcada_anterior: item.respuesta_marcada || null,
                respuesta_correcta_original: respuestaCorrecta
            };
        }

        function crearOrigen(item) {
            if (item.tema && item.test) return `Tema ${item.tema} - Test ${item.test}`;
            if (item.tema) return `Tema ${item.tema}`;
            return 'Pregunta guardada';
        }

        function quitarDuplicadas(lista) {
            const vistas = new Set();
            return lista.filter(p => {
                const clave = normalizarTexto(p.pregunta) + '|' + normalizarTexto(p.respuesta_correcta_original || p.opciones[p.correcta]);
                if (vistas.has(clave)) return false;
                vistas.add(clave);
                return true;
            });
        }

        function normalizarTexto(texto) {
            return String(texto || '').trim().toLowerCase().replace(/\s+/g, ' ');
        }

        function ordenarPorTemaYOrigen(lista) {
            return [...lista].sort((a, b) => {
                const temaA = Number.isFinite(a.tema) ? a.tema : 999;
                const temaB = Number.isFinite(b.tema) ? b.tema : 999;
                if (temaA !== temaB) return temaA - temaB;

                const testA = Number.isFinite(a.test) ? a.test : 999;
                const testB = Number.isFinite(b.test) ? b.test : 999;
                if (testA !== testB) return testA - testB;

                return (a.numero_en_test || 999) - (b.numero_en_test || 999);
            });
        }

        function iniciarRepaso(lista) {
            preguntas = lista;
            preguntaActual = 0;
            respuestasUsuario = Array(preguntas.length).fill(null);

            document.getElementById('panel-carga').style.display = 'none';
            document.getElementById('testForm').style.display = 'block';
            document.getElementById('controles-navegacion').style.display = 'flex';
            document.getElementById('contador').style.display = 'block';
            document.getElementById('indice').style.display = 'flex';
            document.getElementById('total-preguntas').textContent = preguntas.length;
            document.getElementById('resultado').style.display = 'none';
            document.getElementById('descargas-resultados').style.display = 'none';
            document.getElementById('reintentar-incorrectas-btn').style.display = 'none';

            generarIndice();
            mostrarPregunta(0);
            actualizarControlesNavegacion();
        }

        function mezclarArray(array) {
            const copia = [...array];
            for (let i = copia.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copia[i], copia[j]] = [copia[j], copia[i]];
            }
            return copia;
        }

        function mezclarOpcionesPregunta(p) {
            const correctaOriginal = p.opciones[p.correcta];
            p.opciones = mezclarArray(p.opciones);
            p.correcta = p.opciones.indexOf(correctaOriginal);
        }

        function generarIndice() {
            const indice = document.getElementById('indice');
            indice.innerHTML = '';
            preguntas.forEach((_, index) => {
                const numero = document.createElement('div');
                numero.className = 'numero-pregunta';
                numero.textContent = index + 1;
                numero.onclick = () => irAPregunta(index);
                indice.appendChild(numero);
            });
        }

        function irAPregunta(num) {
            preguntaActual = num;
            mostrarPregunta(num);
            actualizarControlesNavegacion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function mostrarPregunta(num) {
            const form = document.getElementById('testForm');
            form.innerHTML = '';
            const pregunta = preguntas[num];
            if (!pregunta) return;

            const divPregunta = document.createElement('div');
            divPregunta.className = 'pregunta';

            const origen = document.createElement('div');
            origen.className = 'origen-pregunta';
            origen.textContent = pregunta.origen || '';
            divPregunta.appendChild(origen);

            const pTexto = document.createElement('p');
            pTexto.textContent = pregunta.pregunta;
            divPregunta.appendChild(pTexto);

            pregunta.opciones.forEach((opcion, index) => {
                const label = document.createElement('label');
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'pregunta';
                input.value = index;
                input.onclick = () => verificarRespuesta(index);

                if (respuestasUsuario[num] !== null) {
                    input.disabled = true;
                    input.checked = respuestasUsuario[num] === index;
                    if (index === pregunta.correcta) label.classList.add('correcta');
                    else if (index === respuestasUsuario[num]) label.classList.add('incorrecta');
                }

                label.appendChild(input);
                label.appendChild(document.createTextNode(opcion));
                divPregunta.appendChild(label);
            });

            if (respuestasUsuario[num] !== null && pregunta.explicacion) {
                const divExplicacion = document.createElement('div');
                divExplicacion.className = 'explicacion';
                divExplicacion.textContent = pregunta.explicacion;
                divExplicacion.style.display = 'block';
                divPregunta.appendChild(divExplicacion);
            }

            form.appendChild(divPregunta);
            document.getElementById('pregunta-actual').textContent = num + 1;
            actualizarIndice();
        }

        function verificarRespuesta(opcionSeleccionada) {
            respuestasUsuario[preguntaActual] = opcionSeleccionada;
            mostrarPregunta(preguntaActual);
            mostrarResultadoParcial();
            actualizarControlesNavegacion();
        }

        function contarCorrectas() {
            return respuestasUsuario.filter((r, i) => r !== null && r === preguntas[i].correcta).length;
        }

        function mostrarResultadoParcial() {
            const preguntasRespondidas = respuestasUsuario.filter(r => r !== null).length;
            const correctas = contarCorrectas();
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerHTML = `
                <p>Respuestas correctas: ${correctas} de ${preguntasRespondidas}</p>
                <p>Porcentaje de aciertos: ${preguntasRespondidas > 0 ? ((correctas / preguntasRespondidas) * 100).toFixed(1) : 0}%</p>
            `;
            resultadoDiv.style.display = 'block';
        }

        function actualizarIndice() {
            document.querySelectorAll('.numero-pregunta').forEach((numero, index) => {
                numero.classList.remove('respondida', 'respondida-incorrecta');
                if (respuestasUsuario[index] !== null) {
                    numero.classList.add(respuestasUsuario[index] === preguntas[index].correcta ? 'respondida' : 'respondida-incorrecta');
                }
            });
        }

        function actualizarControlesNavegacion() {
            document.getElementById('anterior-btn').style.display = preguntaActual === 0 ? 'none' : 'block';
            document.getElementById('siguiente-btn').style.display = preguntaActual === preguntas.length - 1 ? 'none' : 'block';
            document.getElementById('finalizar-btn').style.display = preguntaActual === preguntas.length - 1 ? 'block' : 'none';
        }

        function siguientePregunta() {
            if (preguntaActual < preguntas.length - 1) irAPregunta(preguntaActual + 1);
        }

        function anteriorPregunta() {
            if (preguntaActual > 0) irAPregunta(preguntaActual - 1);
        }

        function finalizarTest() {
            const preguntasRespondidas = respuestasUsuario.filter(r => r !== null).length;
            const correctas = contarCorrectas();
            const incorrectas = preguntas.filter((p, i) => respuestasUsuario[i] !== null && respuestasUsuario[i] !== p.correcta);
            const sinContestar = preguntas.filter((p, i) => respuestasUsuario[i] === null);

            document.getElementById('resultado').innerHTML = `
                <h3>Repaso completado</h3>
                <p>Has respondido ${preguntasRespondidas} de ${preguntas.length} preguntas.</p>
                <p>Respuestas correctas: ${correctas} (${preguntasRespondidas > 0 ? ((correctas / preguntasRespondidas) * 100).toFixed(1) : 0}%)</p>
                <p>Respuestas incorrectas: ${incorrectas.length}</p>
                <p>Preguntas sin responder: ${sinContestar.length}</p>
            `;
            document.getElementById('resultado').style.display = 'block';

            const hayIncorrectasOSinContestar = incorrectas.length > 0 || sinContestar.length > 0;
            document.getElementById('reintentar-incorrectas-btn').style.display = hayIncorrectasOSinContestar ? 'block' : 'none';
            document.getElementById('descargas-resultados').style.display = hayIncorrectasOSinContestar ? 'flex' : 'none';
            document.getElementById('descargar-incorrectas-btn').style.display = incorrectas.length > 0 ? 'block' : 'none';
            document.getElementById('descargar-sin-contestar-btn').style.display = sinContestar.length > 0 ? 'block' : 'none';
        }

        function prepararPreguntaParaGuardar(pregunta, index) {
            const respuestaUsuario = respuestasUsuario[index];
            return {
                numero_en_test: index + 1,
                tema: pregunta.tema || '',
                test: pregunta.test || '',
                origen: pregunta.origen || '',
                pregunta: pregunta.pregunta,
                opciones: pregunta.opciones,
                respuesta_marcada: respuestaUsuario === null ? null : pregunta.opciones[respuestaUsuario],
                respuesta_correcta: pregunta.opciones[pregunta.correcta],
                explicacion: pregunta.explicacion || ''
            };
        }

        function descargarArchivo(nombreArchivo, datos) {
            const contenido = JSON.stringify(datos, null, 2);
            const blob = new Blob([contenido], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const enlace = document.createElement('a');
            enlace.href = url;
            enlace.download = nombreArchivo;
            document.body.appendChild(enlace);
            enlace.click();
            enlace.remove();
            URL.revokeObjectURL(url);
        }

        function descargarPreguntasIncorrectas() {
            const datos = preguntas
                .map((p, i) => ({ pregunta: p, index: i }))
                .filter(item => respuestasUsuario[item.index] !== null && respuestasUsuario[item.index] !== item.pregunta.correcta)
                .map(item => prepararPreguntaParaGuardar(item.pregunta, item.index));

            if (!datos.length) {
                alert('No tienes preguntas falladas para guardar.');
                return;
            }
            descargarArchivo('repaso-preguntas-falladas.json', datos);
        }

        function descargarPreguntasSinResponder() {
            const datos = preguntas
                .map((p, i) => ({ pregunta: p, index: i }))
                .filter(item => respuestasUsuario[item.index] === null)
                .map(item => prepararPreguntaParaGuardar(item.pregunta, item.index));

            if (!datos.length) {
                alert('No tienes preguntas sin contestar para guardar.');
                return;
            }
            descargarArchivo('repaso-preguntas-sin-contestar.json', datos);
        }

        function reintentarIncorrectas() {
            const preguntasIncorrectas = preguntas.filter((p, i) => respuestasUsuario[i] === null || respuestasUsuario[i] !== p.correcta);
            if (!preguntasIncorrectas.length) {
                alert('No has fallado ninguna pregunta.');
                return;
            }
            let nuevas = [...preguntasIncorrectas];
            if (document.getElementById('mezclar-preguntas').checked) nuevas = mezclarArray(nuevas);
            if (document.getElementById('mezclar-opciones').checked) nuevas.forEach(mezclarOpcionesPregunta);
            iniciarRepaso(nuevas);
        }

        function mostrarError(mensaje) {
            const div = document.getElementById('mensaje-error');
            div.innerHTML = `<strong>Error:</strong><br>${mensaje}`;
            div.style.display = 'block';
        }

        function ocultarError() {
            const div = document.getElementById('mensaje-error');
            div.innerHTML = '';
            div.style.display = 'none';
        }

        function activarModoPolicial() {
            const toggle = document.getElementById('toggleModo');
            if (!toggle) return;
            if (localStorage.getItem('modoPolicial') === 'true') {
                document.body.classList.add('modo-policial');
                toggle.checked = true;
            }
            toggle.addEventListener('change', () => {
                document.body.classList.toggle('modo-policial', toggle.checked);
                localStorage.setItem('modoPolicial', toggle.checked ? 'true' : 'false');
            });
        }
    </script>
</body>
</html>
